<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowthRadar Lite</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 { color: #7dd3a8; margin-bottom: 0.25rem; }
    p  { color: #888; margin-top: 0; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #7dd3a8;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #5bb890; }
    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
    }
    #debug {
      margin-top: 2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.75rem;
      font-family: monospace;
      color: #7dd3a8;
      max-width: 700px;
      width: 90%;
      white-space: pre-wrap;
      display: none;
    }
    #patient-card {
      margin-top: 2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      max-width: 700px;
      width: 90%;
      display: none;
    }
    #patient-card h2 { margin: 0 0 0.5rem; color: #7dd3a8; font-size: 1.1rem; }
    #patient-card p  { margin: 0.2rem 0; font-size: 0.9rem; color: #ccc; }
    #obs-table {
      margin-top: 1.5rem;
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    #obs-table th {
      text-align: left;
      color: #7dd3a8;
      border-bottom: 1px solid #333;
      padding: 0.4rem 0.5rem;
    }
    #obs-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid #1f1f1f;
      color: #ccc;
    }
  </style>
</head>
<body>

<h1>GrowthRadar Lite</h1>
<p>Pediatric growth monitoring via Epic FHIR</p>
<button id="launch-btn" onclick="startLaunch()">Connect to Epic Sandbox</button>
<div id="status"></div>
<div id="patient-card">
  <h2 id="pt-name"></h2>
  <p id="pt-dob"></p>
  <p id="pt-gender"></p>
  <table id="obs-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Measurement</th>
        <th>Value</th>
        <th>Unit</th>
      </tr>
    </thead>
    <tbody id="obs-body"></tbody>
  </table>
</div>
<div id="debug"></div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  const CLIENT_ID    = 'd2de2027-0d0b-401e-b5ab-df8f24f82aa0';
  const REDIRECT_URI = 'https://dom-martinelli.github.io/growthradar-lite/';
  // ──────────────────────────────────────────────────────────────────────────

  const EPIC_SANDBOX_BASE = 'https://fhir.epic.com/interconnect-fhir-oauth/oauth2';
  const AUTH_URL          = EPIC_SANDBOX_BASE + '/authorize';
  const TOKEN_URL         = EPIC_SANDBOX_BASE + '/token';
  const FHIR_BASE         = 'https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4';

  const SCOPES = 'openid fhirUser patient/Patient.read patient/Observation.read';

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function showDebug(obj) {
    const box = document.getElementById('debug');
    box.style.display = 'block';
    box.textContent = JSON.stringify(obj, null, 2);
  }

  // ── PKCE helpers ───────────────────────────────────────────────────────────
  function base64urlEncode(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function generatePKCE() {
    const verifier  = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
    const hash      = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    const challenge = base64urlEncode(hash);
    return { verifier, challenge };
  }

  // ── Step 1: kick off the auth redirect ────────────────────────────────────
  async function startLaunch() {
    setStatus('Generating PKCE and redirecting to Epic...');
    const { verifier, challenge } = await generatePKCE();
    const state = base64urlEncode(crypto.getRandomValues(new Uint8Array(16)));

    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('oauth_state',   state);

    const params = new URLSearchParams({
      response_type:         'code',
      client_id:             CLIENT_ID,
      redirect_uri:          REDIRECT_URI,
      scope:                 SCOPES,
      state,
      code_challenge:        challenge,
      code_challenge_method: 'S256',
      aud:                   FHIR_BASE,
    });

    window.location.href = AUTH_URL + '?' + params.toString();
  }

  // ── Step 2: handle the redirect back ──────────────────────────────────────
  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    if (error) {
      setStatus('Auth error: ' + error + ' — ' + params.get('error_description'));
      return;
    }
    if (!code) return;

    const savedState = sessionStorage.getItem('oauth_state');
    if (state !== savedState) {
      setStatus('State mismatch — possible CSRF. Aborting.');
      return;
    }

    const verifier = sessionStorage.getItem('pkce_verifier');
    setStatus('Got auth code. Exchanging for token...');
    window.history.replaceState({}, document.title, REDIRECT_URI);

    const body = new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      client_id:     CLIENT_ID,
      code_verifier: verifier,
    });

    try {
      const resp  = await fetch(TOKEN_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    body.toString(),
      });
      const token = await resp.json();

      if (token.error) {
        setStatus('Token error: ' + token.error + ' — ' + token.error_description);
        showDebug(token);
        return;
      }

      sessionStorage.setItem('access_token', token.access_token);
      sessionStorage.setItem('patient_id',   token.patient);

      // show what scopes Epic actually granted
      showDebug({ granted_scopes: token.scope, patient_id: token.patient });

      setStatus('Authenticated. Loading patient data...');
      await loadPatientData(token.access_token, token.patient);

    } catch (err) {
      setStatus('Network error during token exchange: ' + err.message);
    }
  }

  // ── Step 3: fetch patient + observations ──────────────────────────────────
  async function loadPatientData(accessToken, patientId) {
    const headers = {
  Authorization: 'Bearer ' + accessToken,
  Accept: 'application/fhir+json',
};                          
    try {
      const ptResp = await fetch(`${FHIR_BASE}/Patient/${patientId}`, { headers });
      const pt     = await ptResp.json();

      const obsResp = await fetch(
        `${FHIR_BASE}/Observation?patient=${patientId}&category=vital-signs&_count=100`,
        { headers }
      );
      const obsBundle = await obsResp.json();

      renderPatient(pt);
      renderObservations(obsBundle);
      setStatus('');

    } catch (err) {
      setStatus('Error loading FHIR data: ' + err.message);
    }
  }

  // ── Render patient demographics ────────────────────────────────────────────
  function renderPatient(pt) {
    const name   = pt.name?.[0];
    const given  = name?.given?.join(' ') ?? '';
    const family = name?.family ?? '';

    document.getElementById('pt-name').textContent   = `${given} ${family}`.trim() || 'Unknown Patient';
    document.getElementById('pt-dob').textContent    = 'DOB: ' + (pt.birthDate ?? 'N/A');
    document.getElementById('pt-gender').textContent = 'Sex: ' + (pt.gender ?? 'N/A');
    document.getElementById('patient-card').style.display = 'block';
  }

  // ── Render observations table ──────────────────────────────────────────────
  function renderObservations(bundle) {
    const entries = bundle.entry ?? [];
    console.log('Raw obs entries:', JSON.stringify(entries.slice(0,3), null, 2));

    const relevantLOINC = {
      '8302-2':  'Height',
      '29463-7': 'Weight',
      '39156-5': 'BMI',
    };

    const rows = entries
      .map(e => e.resource)
      .filter(obs => {
        const code = obs?.code?.coding?.[0]?.code;
        return relevantLOINC[code];
      })
      .sort((a, b) => new Date(b.effectiveDateTime) - new Date(a.effectiveDateTime));

    const tbody = document.getElementById('obs-body');
    tbody.innerHTML = '';

    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#666">No height/weight data found.</td></tr>';
      return;
    }

    for (const obs of rows) {
      const code  = obs.code.coding[0].code;
      const label = relevantLOINC[code];
      const date  = obs.effectiveDateTime?.split('T')[0] ?? 'N/A';
      const val   = obs.valueQuantity?.value?.toFixed(1) ?? 'N/A';
      const unit  = obs.valueQuantity?.unit ?? '';

      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${date}</td><td>${label}</td><td>${val}</td><td>${unit}</td>`;
      tbody.appendChild(tr);
    }

    window._growthData = buildGrowthSeries(rows, relevantLOINC);
    console.log('Growth data ready for charting:', window._growthData);
  }

  // ── Build clean series for charting ───────────────────────────────────────
  function buildGrowthSeries(rows, loinc) {
    const series = { height: [], weight: [], bmi: [] };
    const keyMap = { '8302-2': 'height', '29463-7': 'weight', '39156-5': 'bmi' };

    for (const obs of rows) {
      const code = obs.code.coding[0].code;
      const key  = keyMap[code];
      if (!key) continue;
      series[key].push({
        date:  obs.effectiveDateTime?.split('T')[0],
        value: obs.valueQuantity?.value,
        unit:  obs.valueQuantity?.unit,
      });
    }

    for (const k of Object.keys(series)) {
      series[k].sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    return series;
  }

  // ── run on page load ───────────────────────────────────────────────────────
  handleCallback();
</script>

</body>
</html>
