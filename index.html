<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowthRadar Lite</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 { color: #7dd3a8; margin-bottom: 0.25rem; }
    p  { color: #888; margin-top: 0; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #7dd3a8;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #5bb890; }
    #status { margin-top: 1rem; font-size: 0.85rem; color: #888; }
    #debug {
      margin-top: 2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.75rem;
      font-family: monospace;
      color: #7dd3a8;
      max-width: 700px;
      width: 90%;
      white-space: pre-wrap;
      display: none;
    }
    #patient-card {
      margin-top: 2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      max-width: 700px;
      width: 90%;
      display: none;
    }
    #patient-card h2 { margin: 0 0 0.5rem; color: #7dd3a8; font-size: 1.1rem; }
    #patient-card p  { margin: 0.2rem 0; font-size: 0.9rem; color: #ccc; }
    #obs-table {
      margin-top: 1.5rem;
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    #obs-table th {
      text-align: left;
      color: #7dd3a8;
      border-bottom: 1px solid #333;
      padding: 0.4rem 0.5rem;
    }
    #obs-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid #1f1f1f;
      color: #ccc;
    }
    #chart-container {
      margin-top: 2rem;
      position: relative;
      height: 350px;
      width: 100%;
    }
    #flags {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .flag-alert {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      color: #fca5a5;
    }
    .flag-alert strong { color: #ef4444; }
    #standard-note {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: #444;
    }
  </style>
</head>
<body>

<h1>GrowthRadar Lite</h1>
<p>Pediatric growth monitoring via Epic FHIR</p>
<button id="launch-btn" onclick="startLaunch()">Connect to Epic Sandbox</button>
<div id="status"></div>
<div id="patient-card">
  <h2 id="pt-name"></h2>
  <p id="pt-dob"></p>
  <p id="pt-gender"></p>
  <table id="obs-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Measurement</th>
        <th>Value</th>
        <th>Unit</th>
        <th>Percentile</th>
      </tr>
    </thead>
    <tbody id="obs-body"></tbody>
  </table>
  <div id="chart-container">
    <canvas id="growth-chart"></canvas>
  </div>
  <div id="flags"></div>
  <p id="standard-note"></p>
</div>
<div id="debug"></div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  const CLIENT_ID    = 'd2de2027-0d0b-401e-b5ab-df8f24f82aa0';
  const REDIRECT_URI = 'https://dom-martinelli.github.io/growthradar-lite/';
  // ──────────────────────────────────────────────────────────────────────────

  const EPIC_SANDBOX_BASE = 'https://fhir.epic.com/interconnect-fhir-oauth/oauth2';
  const AUTH_URL          = EPIC_SANDBOX_BASE + '/authorize';
  const TOKEN_URL         = EPIC_SANDBOX_BASE + '/token';
  const FHIR_BASE         = 'https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4';
  const SCOPES = 'openid fhirUser patient/Patient.read patient/Observation.read';

  // ── WHO height-for-age (boys, 0-24 months): p3, p50, p97 at key months ───
  // source: WHO Child Growth Standards
  const WHO_BOYS_HEIGHT = [
    { months: 0,  p3: 46.1, p50: 49.9, p97: 53.7 },
    { months: 3,  p3: 57.6, p50: 61.4, p97: 65.3 },
    { months: 6,  p3: 63.3, p50: 67.6, p97: 71.9 },
    { months: 9,  p3: 68.0, p50: 72.3, p97: 76.9 },
    { months: 12, p3: 71.7, p50: 75.7, p97: 81.2 },
    { months: 18, p3: 77.5, p50: 82.3, p97: 87.7 },
    { months: 24, p3: 82.5, p50: 87.8, p97: 93.2 },
  ];

  // ── CDC height-for-age (boys, 2-10 yrs): p3, p50, p97 at key ages ────────
  // source: CDC 2000 Growth Charts
  const CDC_BOYS_HEIGHT = [
    { months: 24,  p3: 82.5,  p50: 87.1,  p97: 92.0  },
    { months: 30,  p3: 87.4,  p50: 92.9,  p97: 98.4  },
    { months: 36,  p3: 91.2,  p50: 96.1,  p97: 102.7 },
    { months: 48,  p3: 97.3,  p50: 103.3, p97: 109.9 },
    { months: 60,  p3: 103.0, p50: 109.9, p97: 116.4 },
    { months: 72,  p3: 108.5, p50: 116.0, p97: 123.2 },
    { months: 84,  p3: 114.0, p50: 121.7, p97: 129.7 },
    { months: 96,  p3: 119.2, p50: 127.0, p97: 135.7 },
    { months: 108, p3: 124.0, p50: 132.2, p97: 141.3 },
    { months: 120, p3: 129.0, p50: 137.5, p97: 147.0 },
  ];

  // ── Realistic synthetic data: boy born 2020-03-15 ─────────────────────────
  // Normal early growth, faltering at ~3-4 yrs (drops toward p3), recovers
  const SYNTHETIC_DOB = '2020-03-15';
  const SYNTHETIC = [
    { date: '2020-03-20', type: 'Height', value: 50.2, unit: 'cm' }, // ~birth
    { date: '2020-03-20', type: 'Weight', value: 3.4,  unit: 'kg' },
    { date: '2020-06-18', type: 'Height', value: 62.1, unit: 'cm' }, // 3mo ~p25
    { date: '2020-06-18', type: 'Weight', value: 6.1,  unit: 'kg' },
    { date: '2020-09-15', type: 'Height', value: 67.8, unit: 'cm' }, // 6mo ~p25
    { date: '2020-09-15', type: 'Weight', value: 7.8,  unit: 'kg' },
    { date: '2021-03-15', type: 'Height', value: 75.5, unit: 'cm' }, // 12mo ~p25
    { date: '2021-03-15', type: 'Weight', value: 9.6,  unit: 'kg' },
    { date: '2021-09-15', type: 'Height', value: 81.2, unit: 'cm' }, // 18mo ~p25
    { date: '2021-09-15', type: 'Weight', value: 10.9, unit: 'kg' },
    { date: '2022-03-15', type: 'Height', value: 86.4, unit: 'cm' }, // 24mo ~p25
    { date: '2022-03-15', type: 'Weight', value: 12.1, unit: 'kg' },
    { date: '2022-09-15', type: 'Height', value: 89.1, unit: 'cm' }, // 30mo -- slowing, crossing toward p3
    { date: '2022-09-15', type: 'Weight', value: 12.8, unit: 'kg' },
    { date: '2023-03-15', type: 'Height', value: 91.8, unit: 'cm' }, // 36mo ~p3 -- FLAG
    { date: '2023-03-15', type: 'Weight', value: 13.2, unit: 'kg' },
    { date: '2023-09-15', type: 'Height', value: 96.2, unit: 'cm' }, // 42mo -- recovering
    { date: '2023-09-15', type: 'Weight', value: 14.1, unit: 'kg' },
    { date: '2024-03-15', type: 'Height', value: 102.8, unit: 'cm' }, // 48mo ~p25 -- recovered
    { date: '2024-03-15', type: 'Weight', value: 15.9, unit: 'kg' },
    { date: '2024-09-15', type: 'Height', value: 108.1, unit: 'cm' }, // 54mo ~p25
    { date: '2024-09-15', type: 'Weight', value: 17.2, unit: 'kg' },
  ];

  // ── Percentile interpolation ───────────────────────────────────────────────
  function getPercentile(heightCm, ageMonths) {
    const table = ageMonths <= 24 ? WHO_BOYS_HEIGHT : CDC_BOYS_HEIGHT;

    // find bracketing rows
    let lo = table[0], hi = table[table.length - 1];
    for (let i = 0; i < table.length - 1; i++) {
      if (table[i].months <= ageMonths && table[i+1].months >= ageMonths) {
        lo = table[i]; hi = table[i+1]; break;
      }
    }

    // linear interpolation for p3/p50/p97 at this age
    const t = lo.months === hi.months ? 0 :
      (ageMonths - lo.months) / (hi.months - lo.months);
    const p3  = lo.p3  + t * (hi.p3  - lo.p3);
    const p50 = lo.p50 + t * (hi.p50 - lo.p50);
    const p97 = lo.p97 + t * (hi.p97 - lo.p97);

    // estimate percentile using normal approximation between known points
    if (heightCm <= p3)  return Math.round(3  * (heightCm / p3));
    if (heightCm >= p97) return 97;
    if (heightCm <= p50) return Math.round(3  + 47 * (heightCm - p3)  / (p50 - p3));
    return Math.round(50 + 47 * (heightCm - p50) / (p97 - p50));
  }

  function monthsBetween(dob, dateStr) {
    const d1 = new Date(dob), d2 = new Date(dateStr);
    return (d2.getFullYear() - d1.getFullYear()) * 12 +
           (d2.getMonth()   - d1.getMonth());
  }

  // ── Anomaly flagging ───────────────────────────────────────────────────────
  function detectAnomalies(heightSeries, dob) {
    const flags = [];
    const percentiles = heightSeries.map(pt => ({
      ...pt,
      ageMonths: monthsBetween(dob, pt.date),
      percentile: getPercentile(pt.value, monthsBetween(dob, pt.date)),
    }));

    for (let i = 1; i < percentiles.length; i++) {
      const prev = percentiles[i - 1];
      const curr = percentiles[i];
      const drop = prev.percentile - curr.percentile;

      // flag if percentile drops >20 points between visits
      if (drop >= 20) {
        flags.push({
          date: curr.date,
          message: `Height dropped from ~${prev.percentile}th to ~${curr.percentile}th percentile between ${prev.date} and ${curr.date}. Consider evaluation for growth faltering.`,
        });
      }

      // flag if below p3 at any point
      if (curr.percentile <= 3) {
        flags.push({
          date: curr.date,
          message: `Height at ${curr.date} (${curr.value} cm) is at or below the 3rd percentile for age ${Math.round(curr.ageMonths/12 * 10)/10} years.`,
        });
      }
    }

    return { flags, percentiles };
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function showDebug(obj) {
    const box = document.getElementById('debug');
    box.style.display = 'block';
    box.textContent = JSON.stringify(obj, null, 2);
  }

  // ── PKCE helpers ───────────────────────────────────────────────────────────
  function base64urlEncode(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function generatePKCE() {
    const verifier  = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
    const hash      = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    const challenge = base64urlEncode(hash);
    return { verifier, challenge };
  }

  async function startLaunch() {
    setStatus('Generating PKCE and redirecting to Epic...');
    const { verifier, challenge } = await generatePKCE();
    const state = base64urlEncode(crypto.getRandomValues(new Uint8Array(16)));
    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('oauth_state',   state);
    const params = new URLSearchParams({
      response_type: 'code', client_id: CLIENT_ID,
      redirect_uri: REDIRECT_URI, scope: SCOPES, state,
      code_challenge: challenge, code_challenge_method: 'S256', aud: FHIR_BASE,
    });
    window.location.href = AUTH_URL + '?' + params.toString();
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code'), state = params.get('state'), error = params.get('error');
    if (error) { setStatus('Auth error: ' + error); return; }
    if (!code) return;
    if (state !== sessionStorage.getItem('oauth_state')) {
      setStatus('State mismatch. Aborting.'); return;
    }
    const verifier = sessionStorage.getItem('pkce_verifier');
    setStatus('Got auth code. Exchanging for token...');
    window.history.replaceState({}, document.title, REDIRECT_URI);
    const body = new URLSearchParams({
      grant_type: 'authorization_code', code,
      redirect_uri: REDIRECT_URI, client_id: CLIENT_ID, code_verifier: verifier,
    });
    try {
      const resp  = await fetch(TOKEN_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
      const token = await resp.json();
      if (token.error) { setStatus('Token error: ' + token.error); showDebug(token); return; }
      sessionStorage.setItem('access_token', token.access_token);
      sessionStorage.setItem('patient_id',   token.patient);
      showDebug({ granted_scopes: token.scope, patient_id: token.patient });
      setStatus('Authenticated. Loading patient data...');
      await loadPatientData(token.access_token, token.patient);
    } catch (err) { setStatus('Network error: ' + err.message); }
  }

  async function loadPatientData(accessToken, patientId) {
    const headers = { Authorization: 'Bearer ' + accessToken, Accept: 'application/fhir+json' };
    try {
      const ptResp  = await fetch(`${FHIR_BASE}/Patient/${patientId}`, { headers });
      const pt      = await ptResp.json();
      const obsResp = await fetch(
        `${FHIR_BASE}/Observation?patient=${patientId}&category=http://terminology.hl7.org/CodeSystem/observation-category|vital-signs&_count=100`,
        { headers }
      );
      const obsBundle = await obsResp.json();
      renderPatient(pt);
      renderObservations(obsBundle, pt.birthDate);
      setStatus('');
    } catch (err) { setStatus('Error loading FHIR data: ' + err.message); }
  }

  function renderPatient(pt) {
    const name = pt.name?.[0];
    document.getElementById('pt-name').textContent   = ([name?.given?.join(' '), name?.family].filter(Boolean).join(' ')) || 'Unknown Patient';
    document.getElementById('pt-dob').textContent    = 'DOB: ' + (pt.birthDate ?? 'N/A');
    document.getElementById('pt-gender').textContent = 'Sex: ' + (pt.gender ?? 'N/A');
    document.getElementById('patient-card').style.display = 'block';
  }

  function renderObservations(bundle, dobFromFHIR) {
    const entries = bundle.entry ?? [];
    const relevantLOINC = { '8302-2': 'Height', '29463-7': 'Weight', '39156-5': 'BMI' };

    let rows = entries
      .map(e => e.resource)
      .filter(obs => relevantLOINC[obs?.code?.coding?.[0]?.code])
      .sort((a, b) => new Date(a.effectiveDateTime) - new Date(b.effectiveDateTime));

    let dob = dobFromFHIR;
    let usingSynthetic = false;

    if (rows.length === 0) {
      usingSynthetic = true;
      dob = SYNTHETIC_DOB;

      const note = document.createElement('p');
      note.style.cssText = 'font-size:0.75rem;color:#555;margin-top:0.5rem';
      note.textContent = 'No vitals in sandbox record — showing synthetic pediatric demo data.';
      document.getElementById('patient-card').appendChild(note);

      window._growthData = {
        height: SYNTHETIC.filter(r => r.type === 'Height').map(r => ({ date: r.date, value: r.value, unit: r.unit })),
        weight: SYNTHETIC.filter(r => r.type === 'Weight').map(r => ({ date: r.date, value: r.value, unit: r.unit })),
        bmi: [],
      };
    } else {
      window._growthData = buildGrowthSeries(rows, relevantLOINC);
    }

    // run anomaly detection on height series
    const { flags, percentiles } = detectAnomalies(window._growthData.height, dob);
    const percentileMap = {};
    percentiles.forEach(p => { percentileMap[p.date] = p.percentile; });

    // render table
    const tbody = document.getElementById('obs-body');
    tbody.innerHTML = '';
    const displayRows = usingSynthetic ? SYNTHETIC : rows.map(obs => ({
      date: obs.effectiveDateTime?.split('T')[0],
      type: relevantLOINC[obs.code.coding[0].code],
      value: obs.valueQuantity?.value,
      unit: obs.valueQuantity?.unit,
    }));

    for (const r of displayRows) {
      const pct = r.type === 'Height' && percentileMap[r.date] !== undefined
        ? percentileMap[r.date] + 'th' : '';
      const isFlagged = flags.some(f => f.date === r.date) && r.type === 'Height';
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.date}</td><td>${r.type}</td><td>${r.value}</td><td>${r.unit}</td>
        <td style="color:${isFlagged ? '#ef4444' : '#888'}">${pct}${isFlagged ? ' ⚠' : ''}</td>`;
      tbody.appendChild(tr);
    }

    // render flags
    const flagBox = document.getElementById('flags');
    flagBox.innerHTML = '';
    for (const f of flags) {
      const div = document.createElement('div');
      div.className = 'flag-alert';
      div.innerHTML = `<strong>⚠ Flagged ${f.date}:</strong> ${f.message}`;
      flagBox.appendChild(div);
    }

    // standard note
    document.getElementById('standard-note').textContent =
      'Percentiles: WHO standards used for ages 0-24 months; CDC 2000 charts for ages 2+.';

    renderChart(window._growthData, flags, percentiles);
  }

  function buildGrowthSeries(rows, loinc) {
    const series = { height: [], weight: [], bmi: [] };
    const keyMap = { '8302-2': 'height', '29463-7': 'weight', '39156-5': 'bmi' };
    for (const obs of rows) {
      const key = keyMap[obs.code.coding[0].code];
      if (!key) continue;
      series[key].push({ date: obs.effectiveDateTime?.split('T')[0], value: obs.valueQuantity?.value, unit: obs.valueQuantity?.unit });
    }
    for (const k of Object.keys(series)) series[k].sort((a, b) => new Date(a.date) - new Date(b.date));
    return series;
  }

  function renderChart(growthData, flags, percentiles) {
    const ctx = document.getElementById('growth-chart').getContext('2d');
    const flagDates = new Set(flags.map(f => f.date));

    const heightPoints = growthData.height.map(d => ({ x: d.date, y: d.value }));
    const weightPoints = growthData.weight.map(d => ({ x: d.date, y: d.value }));

    // red dot dataset for flagged height points
    const flagPoints = growthData.height
      .filter(d => flagDates.has(d.date))
      .map(d => ({ x: d.date, y: d.value }));

    new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'Height (cm)',
            data: heightPoints,
            borderColor: '#7dd3a8',
            backgroundColor: 'rgba(125,211,168,0.1)',
            yAxisID: 'yHeight',
            tension: 0.3,
            pointRadius: 5,
          },
          {
            label: 'Weight (kg)',
            data: weightPoints,
            borderColor: '#f0a868',
            backgroundColor: 'rgba(240,168,104,0.1)',
            yAxisID: 'yWeight',
            tension: 0.3,
            pointRadius: 5,
          },
          {
            label: 'Flagged point',
            data: flagPoints,
            borderColor: 'transparent',
            backgroundColor: '#ef4444',
            yAxisID: 'yHeight',
            type: 'scatter',
            pointRadius: 9,
            pointStyle: 'triangle',
            showLine: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#ccc' } },
          tooltip: {
            bodyColor: '#ccc',
            titleColor: '#7dd3a8',
            callbacks: {
              afterBody: (items) => {
                const date = items[0]?.label;
                const pct = percentiles?.find(p => p.date === date);
                if (pct) return [`Height percentile: ${pct.percentile}th`];
                return [];
              },
            },
          },
        },
        scales: {
          x: { type: 'category', ticks: { color: '#888' }, grid: { color: '#222' } },
          yHeight: {
            type: 'linear', position: 'left',
            ticks: { color: '#7dd3a8' }, grid: { color: '#222' },
            title: { display: true, text: 'Height (cm)', color: '#7dd3a8' },
          },
          yWeight: {
            type: 'linear', position: 'right',
            ticks: { color: '#f0a868' }, grid: { drawOnChartArea: false },
            title: { display: true, text: 'Weight (kg)', color: '#f0a868' },
          },
        },
      },
    });
  }

  handleCallback();
</script>

</body>
</html>
